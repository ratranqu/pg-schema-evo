name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run unit tests with coverage
        run: swift test --filter PGSchemaEvoCoreTests --enable-code-coverage

      - name: Generate coverage report
        id: coverage
        run: |
          BIN=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -print -quit)
          TEST_BIN=$(find "$BIN" -name '*.xctest' -print -quit)
          if [ -z "$TEST_BIN" ]; then
            TEST_BIN=$(find "$BIN" -name 'pg-schema-evoPackageTests' -print -quit)
          fi
          llvm-cov export -format=lcov \
            -instr-profile="$PROFDATA" \
            "$TEST_BIN" \
            -ignore-filename-regex='Tests/|\.build/' \
            > coverage.lcov
          llvm-cov report \
            -instr-profile="$PROFDATA" \
            "$TEST_BIN" \
            -ignore-filename-regex='Tests/|\.build/' \
            | tee coverage-summary.txt

          # Extract total line coverage percentage from the TOTAL row
          COVERAGE=$(tail -1 coverage-summary.txt | awk '{for(i=1;i<=NF;i++) if($i ~ /^[0-9]+\.[0-9]+%$/) last=$i} END{gsub(/%/,"",last); print last}')
          echo "line_coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Total line coverage: ${COVERAGE}%"

          echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Line coverage: ${COVERAGE}%**" >> "$GITHUB_STEP_SUMMARY"

      - name: Save baseline coverage (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ steps.coverage.outputs.line_coverage }}" > coverage-baseline.txt

      - name: Upload baseline coverage
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: coverage-baseline.txt
          key: coverage-baseline-${{ github.sha }}

      - name: Restore baseline coverage (PR)
        if: github.event_name == 'pull_request'
        id: baseline
        uses: actions/cache/restore@v4
        with:
          path: coverage-baseline.txt
          key: coverage-baseline-
          restore-keys: coverage-baseline-

      - name: Check coverage regression (PR)
        if: github.event_name == 'pull_request'
        run: |
          CURRENT="${{ steps.coverage.outputs.line_coverage }}"
          if [ -f coverage-baseline.txt ]; then
            BASELINE=$(cat coverage-baseline.txt)
            echo "Baseline coverage (main): ${BASELINE}%"
            echo "Current coverage (PR):    ${CURRENT}%"
            DROP=$(echo "$BASELINE - $CURRENT" | bc)
            echo "Coverage change: -${DROP}%"
            EXCEEDED=$(echo "$DROP > 1.0" | bc)
            if [ "$EXCEEDED" = "1" ]; then
              echo "::error::Coverage dropped by ${DROP}% (from ${BASELINE}% to ${CURRENT}%). Maximum allowed regression is 1%."
              exit 1
            else
              echo "Coverage check passed."
            fi
          else
            echo "No baseline coverage found — skipping regression check."
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.lcov
            coverage-summary.txt

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      source-pg:
        image: postgres:16
        env:
          POSTGRES_DB: source_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d source_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      target-pg:
        image: postgres:16
        env:
          POSTGRES_DB: target_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d target_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    container:
      image: swift:6.2

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          apt-get update && apt-get install -y postgresql-client

      - name: Seed source database
        run: |
          psql "postgresql://testuser:testpass@source-pg:5432/source_db" -f docker/seed/init.sql

      - name: Build
        run: swift build

      - name: Run integration tests
        env:
          SOURCE_DSN: "postgresql://testuser:testpass@source-pg:5432/source_db"
          TARGET_DSN: "postgresql://testuser:testpass@target-pg:5432/target_db"
        run: swift test --filter PGSchemaEvoIntegrationTests --parallel --num-workers 1

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pg-schema-evo:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
