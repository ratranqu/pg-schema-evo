name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-build-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}

      - name: Build
        run: swift build

  unit-tests:
    name: Unit Tests
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Restore Swift build cache
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: swift-build-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}

      - name: Run unit tests with coverage
        run: swift test --filter PGSchemaEvoCoreTests --enable-code-coverage

      - name: Generate coverage report
        run: |
          BIN=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -print -quit)
          TEST_BIN=$(find "$BIN" -name '*.xctest' -print -quit)
          if [ -z "$TEST_BIN" ]; then
            TEST_BIN=$(find "$BIN" -name 'pg-schema-evoPackageTests' -print -quit)
          fi
          LLVM_COV=$(dirname "$(which swiftc)")/../lib/llvm/bin/llvm-cov
          if [ ! -f "$LLVM_COV" ]; then
            LLVM_COV=$(which llvm-cov 2>/dev/null || find "$(dirname "$(which swiftc)")/.." -name llvm-cov -type f -print -quit)
          fi
          "$LLVM_COV" export -format=lcov \
            -instr-profile="$PROFDATA" \
            "$TEST_BIN" \
            -ignore-filename-regex='Tests/|\.build/' \
            > coverage-unit.lcov

      - name: Upload unit coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.lcov

  integration-tests:
    name: Integration Tests
    needs: [build]
    runs-on: ubuntu-latest

    services:
      source-pg:
        image: postgres:16
        env:
          POSTGRES_DB: source_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d source_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      target-pg:
        image: postgres:16
        env:
          POSTGRES_DB: target_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d target_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.2'

      - name: Seed source database
        run: |
          psql "postgresql://testuser:testpass@localhost:5432/source_db" -f docker/seed/init.sql

      - name: Restore Swift build cache
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: swift-build-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}

      - name: Run integration tests with coverage
        env:
          SOURCE_DSN: "postgresql://testuser:testpass@localhost:5432/source_db"
          TARGET_DSN: "postgresql://testuser:testpass@localhost:5433/target_db"
        run: swift test --filter PGSchemaEvoIntegrationTests --parallel --num-workers 1 --enable-code-coverage

      - name: Generate coverage report
        run: |
          BIN=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name 'default.profdata' -print -quit)
          TEST_BIN=$(find "$BIN" -name '*.xctest' -print -quit)
          if [ -z "$TEST_BIN" ]; then
            TEST_BIN=$(find "$BIN" -name 'pg-schema-evoPackageTests' -print -quit)
          fi
          LLVM_COV=$(dirname "$(which swiftc)")/../lib/llvm/bin/llvm-cov
          if [ ! -f "$LLVM_COV" ]; then
            LLVM_COV=$(which llvm-cov 2>/dev/null || find "$(dirname "$(which swiftc)")/.." -name llvm-cov -type f -print -quit)
          fi
          "$LLVM_COV" export -format=lcov \
            -instr-profile="$PROFDATA" \
            "$TEST_BIN" \
            -ignore-filename-regex='Tests/|\.build/' \
            > coverage-integration.lcov

      - name: Upload integration coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.lcov

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration

      - name: Merge coverage and check regression
        id: coverage
        run: |
          # Merge LCOV files by taking max hit count per file+line.
          # Simple concatenation double-counts lines, halving coverage.
          python3 - coverage-unit.lcov coverage-integration.lcov coverage-combined.lcov <<'PYEOF'
          import sys
          from collections import defaultdict

          unit_file, integ_file, out_file = sys.argv[1], sys.argv[2], sys.argv[3]
          # Track max hit count per (source_file, line_number)
          hits = defaultdict(int)  # (file, line) -> max_hits
          files_seen = set()
          current_file = None

          for lcov_path in [unit_file, integ_file]:
              try:
                  with open(lcov_path) as f:
                      for line in f:
                          line = line.strip()
                          if line.startswith('SF:'):
                              current_file = line[3:]
                              files_seen.add(current_file)
                          elif line.startswith('DA:') and current_file:
                              parts = line[3:].split(',')
                              if len(parts) >= 2:
                                  lineno = parts[0]
                                  count = int(parts[1])
                                  key = (current_file, lineno)
                                  hits[key] = max(hits[key], count)
                          elif line == 'end_of_record':
                              current_file = None
              except FileNotFoundError:
                  pass

          # Write merged LCOV
          with open(out_file, 'w') as out:
              for sf in sorted(files_seen):
                  out.write(f'SF:{sf}\n')
                  file_lines = sorted(
                      [(k[1], v) for k, v in hits.items() if k[0] == sf],
                      key=lambda x: int(x[0])
                  )
                  for lineno, count in file_lines:
                      out.write(f'DA:{lineno},{count}\n')
                  out.write('end_of_record\n')
          PYEOF

          # Extract total line coverage from merged LCOV
          LINES_FOUND=$(grep -c '^DA:' coverage-combined.lcov || echo 0)
          LINES_HIT=$(grep '^DA:' coverage-combined.lcov | awk -F, '$2 > 0' | wc -l || echo 0)
          if [ "$LINES_FOUND" -gt 0 ]; then
            COVERAGE=$(echo "scale=2; $LINES_HIT * 100 / $LINES_FOUND" | bc)
          else
            COVERAGE="0.00"
          fi
          echo "line_coverage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Total combined line coverage: ${COVERAGE}%"

          # Summary
          echo "## Code Coverage (Unit + Integration)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lines found | $LINES_FOUND |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lines hit | $LINES_HIT |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Line coverage** | **${COVERAGE}%** |" >> "$GITHUB_STEP_SUMMARY"

      - name: Save baseline coverage (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ steps.coverage.outputs.line_coverage }}" > coverage-baseline.txt

      - name: Upload baseline coverage
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: coverage-baseline.txt
          key: coverage-baseline-${{ github.sha }}

      - name: Restore baseline coverage (PR)
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@v4
        with:
          path: coverage-baseline.txt
          key: coverage-baseline-
          restore-keys: coverage-baseline-

      - name: Check coverage regression (PR)
        if: github.event_name == 'pull_request'
        run: |
          CURRENT="${{ steps.coverage.outputs.line_coverage }}"
          MINIMUM="70.0"

          # Check minimum coverage threshold
          BELOW_MIN=$(echo "$CURRENT < $MINIMUM" | bc)
          if [ "$BELOW_MIN" = "1" ]; then
            echo "::error::Coverage is ${CURRENT}%, below the minimum threshold of ${MINIMUM}%."
            exit 1
          fi

          # Check regression from baseline
          if [ -f coverage-baseline.txt ]; then
            BASELINE=$(cat coverage-baseline.txt)
            echo "Baseline coverage (main): ${BASELINE}%"
            echo "Current coverage (PR):    ${CURRENT}%"
            DROP=$(echo "$BASELINE - $CURRENT" | bc)
            echo "Coverage change: -${DROP}%"
            EXCEEDED=$(echo "$DROP > 1.0" | bc)
            if [ "$EXCEEDED" = "1" ]; then
              echo "::error::Coverage dropped by ${DROP}% (from ${BASELINE}% to ${CURRENT}%). Maximum allowed regression is 1%."
              exit 1
            else
              echo "Coverage check passed."
            fi
          else
            echo "No baseline coverage found — skipping regression check."
          fi

      - name: Update README coverage badge (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          COVERAGE="${{ steps.coverage.outputs.line_coverage }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update the coverage line in README.md
          sed -i "s/| Line coverage | .*|/| Line coverage | **${COVERAGE}%** (max 1% regression per PR) |/" README.md

          if git diff --quiet README.md; then
            echo "No coverage change — skipping commit."
          else
            git add README.md
            git commit -m "Update code coverage baseline to ${COVERAGE}% [skip ci]"
            git push origin main
          fi

      - name: Upload combined coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-combined.lcov

  docker-build:
    name: Docker Build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pg-schema-evo:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
