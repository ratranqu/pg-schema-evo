name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run unit tests
        run: swift test --filter PGSchemaEvoCoreTests

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      source-pg:
        image: postgres:16
        env:
          POSTGRES_DB: source_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d source_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      target-pg:
        image: postgres:16
        env:
          POSTGRES_DB: target_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d target_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    container:
      image: swift:6.2

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          apt-get update && apt-get install -y postgresql-client

      - name: Seed source database
        run: |
          psql "postgresql://testuser:testpass@source-pg:5432/source_db" -f docker/seed/init.sql

      - name: Build
        run: swift build

      - name: Run integration tests
        env:
          SOURCE_DSN: "postgresql://testuser:testpass@source-pg:5432/source_db"
          TARGET_DSN: "postgresql://testuser:testpass@target-pg:5432/target_db"
        run: swift test --filter PGSchemaEvoIntegrationTests
