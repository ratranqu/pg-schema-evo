version: "3.8"

services:
  source-pg:
    image: postgres:16
    environment:
      POSTGRES_DB: source_db
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "15432:5432"
    volumes:
      - ./seed/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d source_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  target-pg:
    image: postgres:16
    environment:
      POSTGRES_DB: target_db
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d target_db"]
      interval: 5s
      timeout: 3s
      retries: 10
